services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: maxhub
      POSTGRES_USER: maxhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maxhub_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxhub"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Backend (Fastify) ──────────────────────────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./BACKEND/.env
    environment:
      DATABASE_URL: postgresql://maxhub:${POSTGRES_PASSWORD:-maxhub_secret}@postgres:5432/maxhub
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend (Vue 3 SPA) ───────────────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  pgdata:
  redisdata:
